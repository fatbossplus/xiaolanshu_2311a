syntax = "proto3";

package user;
option go_package = "./";

service User {
  rpc GetUserInfoByPhone(GetUserInfoByPhoneReq) returns (GetUserInfoByPhoneResp); // 根据手机号查询用户信息
}


// 根据手机号查询用户信息请求
message GetUserInfoByPhoneReq {
  string phone = 1;
}

// 根据手机号查询用户信息响应
message GetUserInfoByPhoneResp {
  string phone = 1;
  string nickname = 2;
  string avatar = 3;
  string password = 4;
  string ID = 5;
}

