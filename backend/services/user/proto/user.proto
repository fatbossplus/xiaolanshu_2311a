syntax = "proto3";

package user;

option go_package = "backend/services/user/proto;userpb";

// UserService 用户服务
service UserService {
  rpc GetUserInfo(GetUserInfoReq) returns (GetUserInfoResp);
  rpc Login(LoginReq) returns (LoginResp);
  rpc Register(RegisterReq) returns (RegisterResp);
}

message GetUserInfoReq {
  int64 user_id = 1;
}

message GetUserInfoResp {
  int64  user_id  = 1;
  string username = 2;
  string avatar   = 3;
  string bio      = 4;
}

message LoginReq {
  string username = 1;
  string password = 2;
}

message LoginResp {
  string token   = 1;
  int64  user_id = 2;
}

message RegisterReq {
  string username = 1;
  string password = 2;
}

message RegisterResp {
  int64 user_id = 1;
}
